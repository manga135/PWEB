<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Operacoes</title>
    <script>
        var num1 = parseFloat(prompt("Digite o primeiro numero"));
        var num2 = parseFloat(prompt("Digite o segundo numero"));

        var soma = num1 + num2;
        var sub = num1 - num2;
        var prod = num1 * num2;
        var div = num1 / num2;
        var res = num1 % num2;

        alert("Soma: " + soma);
        alert("Subtração: " + sub);
        alert("Produto: " + prod);
        alert("Divisão: " + div);
        alert("Resto: " + res);
    </script>
</head>
